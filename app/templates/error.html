<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Error — SRT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .error-container {
      max-width: 600px;
      padding: 40px;
      text-align: center;
    }
    .error-icon {
      font-size: 64px;
      margin-bottom: 20px;
    }
    h1 {
      color: #ff6b6b;
      font-size: 24px;
      margin-bottom: 16px;
    }
    .error-details {
      background: #16213e;
      padding: 20px;
      border-radius: 8px;
      margin: 20px 0;
      text-align: left;
      font-size: 14px;
      color: #888;
    }
    .btn {
      display: inline-block;
      background: #4ecca3;
      color: #1a1a2e;
      padding: 12px 24px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
      margin-top: 20px;
    }
    .btn:hover {
      background: #45b393;
    }
    code {
      background: #0f0f23;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="error-container">
    <div class="error-icon">⚠️</div>
    <h1>Something went wrong</h1>
    <p>We encountered an unexpected error. Our team has been notified.</p>
    
    <div class="error-details">
      <strong>Path:</strong> <code>{{ path }}</code><br>
      <strong>Error:</strong> <code>{{ error }}</code>
    </div>
    
    <a href="/" class="btn">Return to Home</a>
  </div>
</body>
</html>
