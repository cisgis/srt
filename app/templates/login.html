<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — SRT Inventory</title>
  <link rel="stylesheet" href="/static/css/main.css">
  <style>
    body { margin: 0; background: #1a1a1a; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-box { background: #222; padding: 40px; border-radius: 8px; width: 100%; max-width: 320px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
    .login-logo { text-align: center; margin-bottom: 24px; font-size: 20px; color: #888; font-weight: 600; letter-spacing: 2px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 6px; color: #888; font-size: 13px; }
    .form-group input { width: 100%; padding: 10px 12px; border: 1px solid #444; border-radius: 4px; background: #2a2a2a; color: #eee; font-size: 14px; box-sizing: border-box; }
    .form-group input:focus { outline: none; border-color: #e67e22; }
    .btn { width: 100%; padding: 12px; background: #e67e22; color: #fff; border: none; border-radius: 4px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .btn:hover { background: #d35400; }
    .error { color: #e74c3c; font-size: 13px; margin-bottom: 16px; text-align: center; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-logo">SRT INVENTORY</div>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="post">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" required autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required>
      </div>
      <button type="submit" class="btn">Sign In</button>
    </form>
  </div>
</body>
</html>
